<!doctype html>
<html lang="es">
  <head>
    <title>Cuenta regresiva Mundial</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Open+Sans:ital,wght@1,600&display=swap"
      rel="stylesheet" />

    <style>
      .stage {
        position: relative;
        width: 3840px;
        height: 542px;
        transform-origin: top left;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
      }

      /* VIDEO */
      .video-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 3840px;
        height: 542px;
        object-fit: cover; /* IMPORTANTE */
        z-index: 0;
      }
      /* CONTENEDOR BASE */
      .contador {
        position: absolute;
        display: flex;
        flex-direction:;
        justify-content: center;
        align-items: center;
        text-align: center;
		gap: 20px;
      }

      /* AJUSTA ESTAS POSICIONES SEGÚN TUS CUADROS VERDES */
      .contador1 {
        left: 200px;
        top: 130px;
        width: 1000px;
        height: 400px;
      }

      .contador2 {
        left: 2500px;
        top: 130px;
        width: 900px;
        height: 400px;
      }
      .contador3 {
        left: 1400px;
        top: 100px;
        width: 900px;
        height: 400px;
      }
      /* NÚMERO */
      .numero {
        font-family: "Dela Gothic One", sans-serif;
        font-weight: 400;
        font-style: normal;
        font-size: 140px;
        color: #012bff;
        line-height: 1;
      }

      /* FRASE */
      .frase {
        font-family: "Dela Gothic One", sans-serif;
        font-weight: 400;
        font-style: normal;
        font-size: 100px;
        color: #012bff;
        margin-top: -10px;
      }
      .frases {
        font-family: "Open Sans", sans-serif;
        font-optical-sizing: auto;
        font-weight: 600;
        font-style: italic;
        font-variation-settings: "wdth" 100;
        font-size: 150px;
        color: #ffffff;
        line-height: 100%;
      }
    </style>
  </head>

  <body>
    <div class="stage">
      <video class="video-bg" autoplay muted loop>
        <source src="fondo.mp4" type="video/mp4" />
      </video>

      <div class="contador contador1">
        <div class="numero" id="dias1">0</div>
        <div class="frase">DÍAS</div>
      </div>

      <div class="contador contador2">
        <div class="numero" id="dias2">0</div>
        <div class="frase">DÍAS</div>
      </div>
      <div class="contador contador3">
        <div class="frases" id="fraseRotativa"></div>
      </div>
      <script>
       
        // Fecha del Mundial (11 junio 2026)
        const fechaObjetivo = new Date("June 12, 2026 00:00:00").getTime();

        function actualizarContador() {
          const ahora = new Date().getTime();
          const diferencia = fechaObjetivo - ahora;

          const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));

          document.getElementById("dias1").innerHTML = dias;
          document.getElementById("dias2").innerHTML = dias;
        }

        actualizarContador();
        setInterval(actualizarContador, 60000);

        // LISTA DE FRASES
        const listaFrases = [
          "Para: Cantar goles con extraños",
          "Para: No lavar la camiseta",
          "Para: Sufrir juntos cada partido",
          "Para: Vivir 90 min eternos",
          "Para: Gritarle a la pantalla",
          "Para: Celebrar como nunca",
          "Para: Sentirse técnico"
        ];

        let indiceActual = 0;

        // Función para cambiar frase
        function cambiarFrase() {
          const elementoFrase = document.getElementById("fraseRotativa");

          const indiceAleatorio = Math.floor(Math.random() * listaFrases.length);

          elementoFrase.innerHTML = listaFrases[indiceAleatorio];
		  
        }

        // Mostrar primera frase al cargar
        cambiarFrase();

        // Cambiar cada 30 minutos (1800000 ms)
        setInterval(cambiarFrase, 6000);
      </script>
    </div>
  </body>
</html>
